name: Deploy Windows

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main
      skip_build:
        description: Skip docker build on server
        required: false
        default: "false"

concurrency:
  group: production-deploy-windows
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Windows Server
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Build deployment archive
        run: |
          tar \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude="artifacts" \
            --exclude=".cloudflared" \
            --exclude="deploy/production/ssl" \
            -czf sellgram-deploy.tgz .

      - name: Upload deployment archive
        run: |
          scp -P "${{ secrets.SSH_PORT }}" sellgram-deploy.tgz "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:sellgram-deploy.tgz"

      - name: Upload production env file
        run: |
          cat > .env.prod <<'EOF'
          ${{ secrets.PROD_ENV_FILE }}
          EOF
          scp -P "${{ secrets.SSH_PORT }}" .env.prod "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}:sellgram.env.prod"

      - name: Deploy on Windows server
        run: |
          ssh -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }}" '
            powershell -NoProfile -ExecutionPolicy Bypass -Command "
              $ErrorActionPreference = \"Stop\"
              $deployPath = \"${{ vars.DEPLOY_PATH }}\"
              $archivePath = Join-Path $HOME \"sellgram-deploy.tgz\"
              $envUploadPath = Join-Path $HOME \"sellgram.env.prod\"
              New-Item -ItemType Directory -Force -Path $deployPath | Out-Null
              tar -xzf $archivePath -C $deployPath
              Copy-Item $envUploadPath (Join-Path $deployPath \"deploy/production/.env.prod\") -Force
              Set-Location $deployPath
              if (\"${{ inputs.skip_build }}\" -eq \"true\") {
                & powershell -NoProfile -ExecutionPolicy Bypass -File \"deploy/production/Deploy-Windows.ps1\" -EnvFile \".env.prod\" -SkipBuild
              } else {
                & powershell -NoProfile -ExecutionPolicy Bypass -File \"deploy/production/Deploy-Windows.ps1\" -EnvFile \".env.prod\"
              }
              Remove-Item $archivePath -Force -ErrorAction SilentlyContinue
              Remove-Item $envUploadPath -Force -ErrorAction SilentlyContinue
            "
          '
