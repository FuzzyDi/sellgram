name: Deploy Windows

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy
        required: false
        default: main
      skip_build:
        description: Skip docker build on server
        required: false
        default: "false"

concurrency:
  group: production-deploy-windows
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy on self-hosted Windows runner
    runs-on:
      - self-hosted
      - windows
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref }}
          path: repo

      - name: Sync repository to deployment path
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $source = Join-Path $env:GITHUB_WORKSPACE "repo"
          $target = "${{ vars.DEPLOY_PATH }}"

          New-Item -ItemType Directory -Force -Path $target | Out-Null

          robocopy $source $target /MIR /XD ".git" "node_modules" "artifacts" ".cloudflared" "deploy\production\ssl"
          if ($LASTEXITCODE -gt 7) {
            throw "robocopy failed with exit code $LASTEXITCODE"
          }

      - name: Write production env file
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          $target = Join-Path "${{ vars.DEPLOY_PATH }}" "deploy\production\.env.prod"
          [System.IO.File]::WriteAllText($target, @'
          ${{ secrets.PROD_ENV_FILE }}
          '@.TrimStart(), [System.Text.Encoding]::UTF8)

      - name: Run Windows deployment script
        shell: powershell
        run: |
          $ErrorActionPreference = "Stop"
          Set-Location "${{ vars.DEPLOY_PATH }}"
          if ("${{ inputs.skip_build }}" -eq "true") {
            powershell -NoProfile -ExecutionPolicy Bypass -File "deploy\production\Deploy-Windows.ps1" -EnvFile ".env.prod" -SkipBuild
          } else {
            powershell -NoProfile -ExecutionPolicy Bypass -File "deploy\production\Deploy-Windows.ps1" -EnvFile ".env.prod"
          }
