<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SellGram</title>
  <meta name="description" content="SellGram: Telegram ichida do'kon ochish va boshqarish platformasi" />
  <style>
    :root {
      --bg: #f2f6f3;
      --panel: #ffffff;
      --panel-soft: #f7fbf8;
      --text: #15231a;
      --muted: #5d6d63;
      --line: #dbe6df;
      --brand: #00875a;
      --brand-2: #00b376;
      --radius: 18px;
      --shadow: 0 20px 50px rgba(14, 42, 24, 0.08);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Manrope", "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 320px at 0% -120px, #d6f0e2 0%, transparent 65%),
        radial-gradient(900px 340px at 100% -140px, #e4f7ee 0%, transparent 66%),
        var(--bg);
      line-height: 1.5;
    }

    .wrap { max-width: 1160px; margin: 0 auto; padding: 22px; }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin-bottom: 24px;
    }

    .brand {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-weight: 900;
      font-size: 24px;
      letter-spacing: -0.5px;
    }

    .brand-badge {
      width: 36px;
      height: 36px;
      border-radius: 11px;
      display: grid;
      place-items: center;
      color: #fff;
      font-weight: 900;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
    }

    .lang {
      display: inline-flex;
      border-radius: 999px;
      background: #e8f0eb;
      padding: 4px;
      gap: 4px;
    }

    .lang button {
      border: none;
      border-radius: 999px;
      padding: 8px 14px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 800;
      color: #415045;
      background: transparent;
    }

    .lang button.active {
      background: #0f1f16;
      color: #fff;
    }

    .hero {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--shadow);
      padding: 44px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 26px;
      margin-bottom: 16px;
    }

    .hero h1 {
      font-size: clamp(32px, 5vw, 54px);
      line-height: 1.05;
      letter-spacing: -0.9px;
      margin-bottom: 14px;
    }

    .hero p {
      color: var(--muted);
      font-size: 18px;
      margin-bottom: 22px;
      max-width: 560px;
    }

    .actions { display: flex; flex-wrap: wrap; gap: 10px; }

    .btn {
      text-decoration: none;
      border-radius: 12px;
      padding: 13px 20px;
      font-size: 14px;
      font-weight: 800;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
    }

    .btn.primary {
      color: #fff;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
    }

    .btn.ghost {
      color: #26362b;
      background: #fff;
      border-color: var(--line);
    }

    .step {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel-soft);
      padding: 18px;
    }

    .step h3 { font-size: 17px; margin-bottom: 6px; }
    .step p { font-size: 14px; color: var(--muted); margin: 0; }

    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin: 12px 0 20px;
    }

    .feature {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
    }

    .feature .icon { font-size: 22px; margin-bottom: 8px; }
    .feature h4 { font-size: 16px; margin-bottom: 6px; }
    .feature p { font-size: 14px; color: var(--muted); }

    .links {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .links a {
      font-size: 13px;
      font-weight: 700;
      color: #214b36;
      text-decoration: none;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: #fff;
    }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      padding: 8px 2px;
    }

    @media (max-width: 920px) {
      .hero { grid-template-columns: 1fr; padding: 28px; }
      .features { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand"><span class="brand-badge">S</span>SellGram</div>
      <div class="lang">
        <button id="lang-uz" class="active" type="button">UZ</button>
        <button id="lang-ru" type="button">RU</button>
      </div>
    </header>

    <section class="hero">
      <div>
        <h1 data-i18n="hero_title"></h1>
        <p data-i18n="hero_desc"></p>
        <div class="actions">
          <a class="btn primary" href="https://app.sellgram.uz" data-i18n="cta_primary"></a>
          <a class="btn ghost" href="/guide.html" data-i18n="cta_secondary"></a>
        </div>
      </div>
      <div>
        <article class="step">
          <h3 data-i18n="step1_title"></h3>
          <p data-i18n="step1_desc"></p>
        </article>
        <article class="step" style="margin-top:10px">
          <h3 data-i18n="step2_title"></h3>
          <p data-i18n="step2_desc"></p>
        </article>
        <article class="step" style="margin-top:10px">
          <h3 data-i18n="step3_title"></h3>
          <p data-i18n="step3_desc"></p>
        </article>
      </div>
    </section>

    <section class="features">
      <article class="feature">
        <div class="icon">🛍️</div>
        <h4 data-i18n="f1_title"></h4>
        <p data-i18n="f1_desc"></p>
      </article>
      <article class="feature">
        <div class="icon">📦</div>
        <h4 data-i18n="f2_title"></h4>
        <p data-i18n="f2_desc"></p>
      </article>
      <article class="feature">
        <div class="icon">⭐</div>
        <h4 data-i18n="f3_title"></h4>
        <p data-i18n="f3_desc"></p>
      </article>
    </section>

    <div class="links">
      <a href="/privacy.html" data-i18n="link_privacy"></a>
      <a href="/terms.html" data-i18n="link_terms"></a>
      <a href="/guide.html" data-i18n="link_guide"></a>
    </div>

    <footer class="bottom">
      <span>© <span id="year"></span> SellGram</span>
      <span data-i18n="footer_right"></span>
    </footer>
  </div>

  <script>
    const dict = {
      uz: {
        hero_title: "Telegram ichida do'konni 5 daqiqada ishga tushiring",
        hero_desc: "SellGram katalog, savat, buyurtma va mijozlar bilan ishlashni bitta panelda boshqaradi.",
        cta_primary: "Do'kon yaratish",
        cta_secondary: "Qadam-baqadam qo'llanma",
        step1_title: "1. Botni ulang",
        step1_desc: "Bot token kiriting va do'konni faollashtiring.",
        step2_title: "2. Mahsulot joylang",
        step2_desc: "Toifa, narx, rasm va qoldiqni kiriting.",
        step3_title: "3. Sotuvni boshlang",
        step3_desc: "Mijoz Telegram ichida buyurtma beradi, siz paneldan nazorat qilasiz.",
        f1_title: "Miniapp katalog",
        f1_desc: "Mijoz uchun qulay katalog, tez savat va buyurtma.",
        f2_title: "Buyurtma oqimi",
        f2_desc: "Yangi, tayyorlanmoqda, yetkazildi holatlari bo'yicha boshqaruv.",
        f3_title: "Loyallik va to'lov",
        f3_desc: "Ballar tizimi va do'kon egasi uchun moslashuvchan to'lov sozlamalari.",
        link_privacy: "Maxfiylik siyosati",
        link_terms: "Foydalanuvchi kelishuvi",
        link_guide: "Bot ulash qo'llanmasi",
        footer_right: "UZ va RU tillari to'liq qo'llab-quvvatlanadi"
      },
      ru: {
        hero_title: "Запустите магазин в Telegram за 5 минут",
        hero_desc: "SellGram объединяет каталог, корзину, заказы и клиентов в одной панели управления.",
        cta_primary: "Создать магазин",
        cta_secondary: "Пошаговое руководство",
        step1_title: "1. Подключите бота",
        step1_desc: "Укажите bot token и активируйте магазин.",
        step2_title: "2. Добавьте товары",
        step2_desc: "Заполните категории, цены, фото и остатки.",
        step3_title: "3. Начните продажи",
        step3_desc: "Клиент оформляет заказ в Telegram, вы контролируете процесс в панели.",
        f1_title: "Каталог miniapp",
        f1_desc: "Удобная витрина, быстрый заказ и оформление прямо в Telegram.",
        f2_title: "Поток заказов",
        f2_desc: "Статусы заказа, доставка и контроль в реальном времени.",
        f3_title: "Лояльность и оплата",
        f3_desc: "Баллы и гибкие способы оплаты, которые настраивает владелец.",
        link_privacy: "Политика конфиденциальности",
        link_terms: "Пользовательское соглашение",
        link_guide: "Как подключить бота",
        footer_right: "Полная поддержка языков UZ и RU"
      }
    };

    const qs = (s) => document.querySelector(s);
    const qsa = (s) => document.querySelectorAll(s);

    function setLang(lang) {
      const t = dict[lang] || dict.uz;
      localStorage.setItem('sellgram_landing_lang', lang);
      document.documentElement.lang = lang;
      qsa('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (key && t[key]) el.textContent = t[key];
      });
      qs('#lang-uz').classList.toggle('active', lang === 'uz');
      qs('#lang-ru').classList.toggle('active', lang === 'ru');
    }

    qs('#lang-uz').addEventListener('click', () => setLang('uz'));
    qs('#lang-ru').addEventListener('click', () => setLang('ru'));

    const browserLang = (navigator.language || '').toLowerCase();
    const saved = localStorage.getItem('sellgram_landing_lang');
    const initial = saved || (browserLang.startsWith('ru') ? 'ru' : 'uz');

    setLang(initial);
    qs('#year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
