  <style>
    :root {
      --bg: #f2f6f3;
      --panel: #ffffff;
      --panel-soft: #f7fbf8;
      --text: #15231a;
      --muted: #5d6d63;
      --line: #dbe6df;
      --brand: #00875a;
      --brand-2: #00b376;
      --radius: 18px;
      --shadow: 0 20px 50px rgba(14,42,24,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Manrope","IBM Plex Sans","Segoe UI",sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 320px at 0% -120px, #d6f0e2 0%, transparent 65%),
        radial-gradient(900px 340px at 100% -140px, #e4f7ee 0%, transparent 66%),
        var(--bg);
      line-height: 1.5;
    }
    .wrap { max-width: 1160px; margin: 0 auto; padding: 22px; }

    /* ── Header ── */
    .top { display:flex; justify-content:space-between; align-items:center; gap:14px; margin-bottom:24px; }
    .brand { display:inline-flex; align-items:center; gap:10px; font-weight:900; font-size:24px; letter-spacing:-0.5px; text-decoration:none; color:var(--text); }
    .brand-badge { width:36px; height:36px; border-radius:11px; display:grid; place-items:center; color:#fff; font-weight:900; background:linear-gradient(135deg,var(--brand),var(--brand-2)); }
    .lang { display:inline-flex; border-radius:999px; background:#e8f0eb; padding:4px; gap:4px; }
    .lang button { border:none; border-radius:999px; padding:8px 14px; cursor:pointer; font-size:12px; font-weight:800; color:#415045; background:transparent; transition:background 0.14s,color 0.14s; }
    .lang button.active { background:#0f1f16; color:#fff; }
    .lang button:hover:not(.active) { background:#d4e8da; }

    /* ── Buttons ── */
    .btn { text-decoration:none; border-radius:12px; padding:13px 22px; font-size:14px; font-weight:800; border:1px solid transparent; display:inline-flex; align-items:center; gap:7px; cursor:pointer; transition:background 0.14s,box-shadow 0.14s,transform 0.08s,border-color 0.14s; }
    .btn:active { transform:scale(0.97); }
    .btn.primary { color:#fff; background:linear-gradient(135deg,var(--brand),var(--brand-2)); }
    .btn.primary:hover { background:linear-gradient(135deg,#007a51,#009e66); box-shadow:0 6px 18px rgba(0,135,90,0.30); }
    .btn.ghost { color:#26362b; background:#fff; border-color:var(--line); }
    .btn.ghost:hover { background:var(--panel-soft); border-color:#bfd4c8; }
    .btn.lg { padding:16px 28px; font-size:16px; border-radius:14px; }

    /* ── Hero ── */
    .hero { background:var(--panel); border:1px solid var(--line); border-radius:calc(var(--radius)+4px); box-shadow:var(--shadow); padding:48px 44px; display:grid; grid-template-columns:1fr 1fr; gap:40px; margin-bottom:16px; align-items:center; }
    .hero h1 { font-size:clamp(28px,4vw,50px); line-height:1.06; letter-spacing:-0.9px; margin-bottom:16px; }
    .hero h1 span { color:var(--brand); }
    .hero p { color:var(--muted); font-size:17px; margin-bottom:24px; line-height:1.6; }
    .actions { display:flex; flex-wrap:wrap; gap:10px; }

    /* ── Hero screenshots ── */
    .hero-screens { position:relative; display:flex; gap:10px; align-items:flex-end; justify-content:center; }
    .hero-screens .screen-main { width:52%; border-radius:16px; box-shadow:0 16px 48px rgba(0,80,40,0.18); border:1px solid var(--line); }
    .hero-screens .screen-side { width:44%; border-radius:14px; box-shadow:0 8px 24px rgba(0,80,40,0.12); border:1px solid var(--line); margin-bottom:24px; }

    /* ── Stats bar ── */
    .stats { display:grid; grid-template-columns:repeat(3,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:16px; overflow:hidden; margin-bottom:16px; }
    .stat { background:var(--panel); padding:20px 24px; text-align:center; }
    .stat-num { font-size:28px; font-weight:900; color:var(--brand); letter-spacing:-1px; line-height:1; }
    .stat-label { font-size:12px; color:var(--muted); font-weight:600; margin-top:4px; }

    /* ── Steps ── */
    .step { border:1px solid var(--line); border-radius:var(--radius); background:var(--panel-soft); padding:18px 20px; transition:box-shadow 0.2s,transform 0.15s; }
    .step:hover { box-shadow:0 8px 24px rgba(0,90,50,0.10); transform:translateY(-2px); }
    .step-num { display:inline-flex; align-items:center; justify-content:center; width:28px; height:28px; border-radius:8px; background:linear-gradient(135deg,var(--brand),var(--brand-2)); color:#fff; font-size:12px; font-weight:900; margin-bottom:10px; }
    .step h3 { font-size:16px; margin-bottom:5px; }
    .step p { font-size:14px; color:var(--muted); margin:0; line-height:1.55; }

    /* ── Features ── */
    .features { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin:12px 0 16px; }
    .feature { background:var(--panel); border:1px solid var(--line); border-radius:var(--radius); padding:22px 20px; transition:box-shadow 0.2s,transform 0.15s; }
    .feature:hover { box-shadow:0 8px 24px rgba(0,90,50,0.10); transform:translateY(-2px); }
    .feature .icon { font-size:26px; margin-bottom:10px; }
    .feature h4 { font-size:16px; margin-bottom:7px; font-weight:800; }
    .feature p { font-size:14px; color:var(--muted); line-height:1.55; }

    /* ── Screenshots gallery ── */
    .gallery { display:grid; grid-template-columns:repeat(4,1fr); gap:12px; margin:16px 0; }
    .gallery-item { border-radius:14px; overflow:hidden; border:1px solid var(--line); box-shadow:0 4px 16px rgba(0,60,30,0.08); transition:transform 0.2s,box-shadow 0.2s; cursor:pointer; }
    .gallery-item:hover { transform:translateY(-4px); box-shadow:0 12px 32px rgba(0,60,30,0.14); }
    .gallery-item img { width:100%; display:block; }
    .gallery-item span { display:block; padding:8px 12px; font-size:12px; font-weight:700; color:var(--muted); background:var(--panel-soft); }

    /* ── Plans ── */
    .plans { background:var(--panel); border:1px solid var(--line); border-radius:calc(var(--radius)+2px); box-shadow:var(--shadow); padding:36px 32px; margin:16px 0; }
    .plans h2 { font-size:26px; font-weight:800; letter-spacing:-0.4px; margin-bottom:6px; }
    .plans > p { color:var(--muted); font-size:15px; margin-bottom:24px; }
    .plans-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .plan-card { border:1px solid var(--line); border-radius:var(--radius); padding:24px 20px; background:var(--panel-soft); display:flex; flex-direction:column; gap:12px; transition:box-shadow 0.2s,transform 0.15s; }
    .plan-card:hover { box-shadow:0 8px 24px rgba(0,90,50,0.10); transform:translateY(-2px); }
    .plan-card.featured { border-color:var(--brand); background:linear-gradient(160deg,#f0faf5,#e8f7ef); box-shadow:0 0 0 3px rgba(0,135,90,0.12); }
    .plan-name { font-size:18px; font-weight:900; letter-spacing:-0.3px; }
    .plan-price { font-size:30px; font-weight:900; color:var(--brand); letter-spacing:-1px; line-height:1; }
    .plan-price span { font-size:14px; font-weight:600; color:var(--muted); }
    .plan-desc { font-size:13px; color:var(--muted); line-height:1.5; }
    .plan-features { list-style:none; display:flex; flex-direction:column; gap:7px; flex:1; }
    .plan-features li { font-size:13px; display:flex; gap:8px; align-items:flex-start; }
    .plan-features li::before { content:"✓"; color:var(--brand); font-weight:900; flex-shrink:0; margin-top:1px; }
    .plan-badge { display:inline-block; padding:3px 10px; border-radius:999px; font-size:11px; font-weight:800; background:var(--brand); color:#fff; }
    .plan-cta { display:block; text-align:center; padding:11px; border-radius:10px; font-size:13px; font-weight:800; text-decoration:none; border:1px solid var(--line); background:#fff; color:var(--text); transition:background 0.14s,border-color 0.14s; margin-top:4px; }
    .plan-cta:hover { background:var(--panel-soft); border-color:#bfd4c8; }
    .plan-card.featured .plan-cta { background:var(--brand); color:#fff; border-color:var(--brand); }
    .plan-card.featured .plan-cta:hover { background:#007a51; }

    /* ── FAQ ── */
    .faq { margin:16px 0; }
    .faq h2 { font-size:26px; font-weight:800; letter-spacing:-0.4px; margin-bottom:16px; }
    .faq-item { background:var(--panel); border:1px solid var(--line); border-radius:14px; margin-bottom:8px; overflow:hidden; }
    .faq-q { width:100%; text-align:left; background:none; border:none; padding:18px 22px; font-size:15px; font-weight:700; color:var(--text); cursor:pointer; display:flex; justify-content:space-between; align-items:center; gap:12px; font-family:inherit; transition:background 0.14s; }
    .faq-q:hover { background:var(--panel-soft); }
    .faq-q .arrow { font-size:12px; color:var(--muted); transition:transform 0.2s; flex-shrink:0; }
    .faq-q.open .arrow { transform:rotate(180deg); }
    .faq-a { display:none; padding:0 22px 18px; font-size:14px; color:var(--muted); line-height:1.65; }
    .faq-a.open { display:block; }
    .faq-a a { color:var(--brand); font-weight:700; text-decoration:none; }
    .faq-a a:hover { text-decoration:underline; }

    /* ── Bottom CTA ── */
    .bottom-cta { background:linear-gradient(135deg,#0f2e1e,#1a4d31); border-radius:calc(var(--radius)+4px); padding:52px 44px; text-align:center; margin:16px 0; }
    .bottom-cta h2 { font-size:clamp(24px,3.5vw,40px); font-weight:900; color:#fff; letter-spacing:-0.6px; margin-bottom:12px; }
    .bottom-cta p { font-size:16px; color:#a7c4b0; margin-bottom:28px; }
    .bottom-cta .actions { justify-content:center; }

    /* ── Links / footer ── */
    .links { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .links a { font-size:13px; font-weight:700; color:#214b36; text-decoration:none; border:1px solid var(--line); border-radius:999px; padding:8px 14px; background:#fff; transition:background 0.14s,border-color 0.14s; }
    .links a:hover { background:var(--panel-soft); border-color:#bfd4c8; }
    .bottom { display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; color:var(--muted); font-size:13px; padding:10px 2px; margin-top:8px; }

    /* ── Responsive ── */
    @media (max-width: 920px) {
      .hero { grid-template-columns:1fr; padding:28px 24px; }
      .hero-screens { display:none; }
      .features { grid-template-columns:1fr 1fr; }
      .plans-grid { grid-template-columns:1fr; }
      .gallery { grid-template-columns:1fr 1fr; }
      .stats { grid-template-columns:1fr; }
      .bottom-cta { padding:36px 24px; }
    }
    @media (max-width: 560px) {
      .features { grid-template-columns:1fr; }
      .plans { padding:24px 18px; }
      .gallery { grid-template-columns:1fr 1fr; }
    }
  </style>
</head>

    function qs(s) { return document.querySelector(s); }
    function qsa(s) { return document.querySelectorAll(s); }

    function setLang(lang) {
      const t = dict[lang] || dict.uz;
      localStorage.setItem('sellgram_landing_lang', lang);
      document.documentElement.lang = lang;

      qsa('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (key && t[key] !== undefined) el.innerHTML = t[key];
      });
      qsa('[data-i18n-list]').forEach(el => {
        const key = el.getAttribute('data-i18n-list');
        const items = t[key];
        if (Array.isArray(items)) el.innerHTML = items.map(item => `<li>${item}</li>`).join('');
      });

      // FAQ
      const faqList = qs('#faq-list');
      if (faqList && Array.isArray(t.faq)) {
        faqList.innerHTML = t.faq.map((item, i) => `
          <div class="faq-item">
            <button class="faq-q" data-i="${i}" type="button">
              <span>${item.q}</span>
              <span class="arrow">▼</span>
            </button>
            <div class="faq-a" id="faq-a-${i}">${item.a}</div>
          </div>
        `).join('');
        faqList.querySelectorAll('.faq-q').forEach(btn => {
          btn.addEventListener('click', () => {
            const i = btn.getAttribute('data-i');
            const ans = qs(`#faq-a-${i}`);
            const isOpen = ans.classList.contains('open');
            // close all
            qsa('.faq-a').forEach(a => a.classList.remove('open'));
            qsa('.faq-q').forEach(q => q.classList.remove('open'));
            if (!isOpen) { ans.classList.add('open'); btn.classList.add('open'); }
          });
        });
      }

      qs('#lang-uz').classList.toggle('active', lang === 'uz');
      qs('#lang-ru').classList.toggle('active', lang === 'ru');
    }

    qs('#lang-uz').addEventListener('click', () => setLang('uz'));
    qs('#lang-ru').addEventListener('click', () => setLang('ru'));

    const saved = localStorage.getItem('sellgram_landing_lang');
    const browserLang = (navigator.language || '').toLowerCase();
    setLang(saved || (browserLang.startsWith('ru') ? 'ru' : 'uz'));

    qs('#year').textContent = new Date().getFullYear();

    // Load live stats from API
    fetch('/api/system-admin/monitor-config', { headers: { 'Cache-Control': 'no-cache' } })
      .catch(() => {});

    fetch('/api/stats/public')
      .then(r => r.json())
      .then(d => {
        if (d.shops) qs('#stat-shops').textContent = d.shops + '+';
        if (d.orders) qs('#stat-orders').textContent = d.orders.toLocaleString() + '+';
      })
      .catch(() => {
        qs('#stat-shops').textContent = '10+';
        qs('#stat-orders').textContent = '500+';
      });
  </script>
