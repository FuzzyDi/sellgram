<!doctype html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SellGram</title>
  <meta name="description" content="SellGram: Telegram do'konini tez ishga tushiring." />
  <style>
    :root {
      --bg: #f5f7f4;
      --card: #ffffff;
      --text: #1f2a1f;
      --muted: #5f6d5f;
      --accent: #00875a;
      --accent-2: #00a96f;
      --border: #dbe4db;
      --radius: 16px;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background:
        radial-gradient(1200px 500px at 80% -200px, #dff4ea 0%, transparent 60%),
        radial-gradient(800px 400px at -10% 100px, #eef9f2 0%, transparent 50%),
        var(--bg);
      line-height: 1.5;
    }

    .wrap { max-width: 1120px; margin: 0 auto; padding: 20px; }

    .top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      font-size: 24px;
      letter-spacing: -0.4px;
    }

    .logo {
      width: 34px;
      height: 34px;
      border-radius: 10px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      display: grid;
      place-items: center;
      font-weight: 900;
    }

    .lang {
      display: inline-flex;
      background: #e8efea;
      border-radius: 999px;
      padding: 4px;
      gap: 4px;
    }

    .lang button {
      border: none;
      background: transparent;
      padding: 8px 14px;
      border-radius: 999px;
      cursor: pointer;
      font-weight: 700;
      color: #435243;
    }

    .lang button.active {
      background: #0f172a;
      color: #fff;
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: calc(var(--radius) + 4px);
      padding: 44px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 28px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
      margin-bottom: 22px;
    }

    .hero h1 {
      font-size: clamp(30px, 5vw, 50px);
      line-height: 1.08;
      margin-bottom: 14px;
      letter-spacing: -0.8px;
    }

    .hero p {
      color: var(--muted);
      margin-bottom: 22px;
      font-size: 18px;
      max-width: 560px;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }

    .btn {
      border: none;
      text-decoration: none;
      cursor: pointer;
      border-radius: 12px;
      padding: 13px 20px;
      font-weight: 700;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }

    .btn.primary {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: #fff;
    }

    .btn.ghost {
      border: 1px solid var(--border);
      background: #fff;
      color: #2a382a;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: #f9fcf9;
      padding: 18px;
      margin-bottom: 10px;
    }

    .card h3 { margin-bottom: 6px; font-size: 18px; }
    .card p { color: var(--muted); font-size: 14px; }

    .features {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 22px;
    }

    .feature {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px;
    }

    .feature .icon { font-size: 22px; margin-bottom: 8px; }
    .feature h4 { margin-bottom: 6px; font-size: 16px; }
    .feature p { color: var(--muted); font-size: 14px; }

    .bottom {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
      padding: 10px 2px;
    }

    @media (max-width: 900px) {
      .hero { grid-template-columns: 1fr; padding: 24px; }
      .features { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand"><div class="logo">S</div>SellGram</div>
      <div class="lang">
        <button id="lang-uz" class="active" type="button">UZ</button>
        <button id="lang-ru" type="button">RU</button>
      </div>
    </header>

    <section class="hero">
      <div>
        <h1 data-i18n="hero_title"></h1>
        <p data-i18n="hero_desc"></p>
        <div class="actions">
          <a class="btn primary" href="https://app.sellgram.uz" data-i18n="cta_primary"></a>
          <a class="btn ghost" href="/guide" data-i18n="cta_secondary"></a>
        </div>
      </div>

      <div>
        <div class="card">
          <h3 data-i18n="step1_title"></h3>
          <p data-i18n="step1_desc"></p>
        </div>
        <div class="card">
          <h3 data-i18n="step2_title"></h3>
          <p data-i18n="step2_desc"></p>
        </div>
        <div class="card">
          <h3 data-i18n="step3_title"></h3>
          <p data-i18n="step3_desc"></p>
        </div>
      </div>
    </section>

    <section class="features">
      <article class="feature">
        <div class="icon">🛍️</div>
        <h4 data-i18n="f1_title"></h4>
        <p data-i18n="f1_desc"></p>
      </article>
      <article class="feature">
        <div class="icon">📦</div>
        <h4 data-i18n="f2_title"></h4>
        <p data-i18n="f2_desc"></p>
      </article>
      <article class="feature">
        <div class="icon">⭐</div>
        <h4 data-i18n="f3_title"></h4>
        <p data-i18n="f3_desc"></p>
      </article>
    </section>

    <footer class="bottom">
      <span>© <span id="year"></span> SellGram</span>
      <span data-i18n="footer_right"></span>
    </footer>
  </div>

  <script>
    const dict = {
      uz: {
        hero_title: "Telegram ichida do'konni 5 daqiqada ishga tushiring",
        hero_desc: "SellGram bilan katalog, savat, buyurtma va mijoz bilan ishlashni bitta platformada boshqaring.",
        cta_primary: "Do'kon yaratish",
        cta_secondary: "Qo'llanma",
        step1_title: "1. Botni ulang",
        step1_desc: "Bot token kiriting va do'konni faollashtiring.",
        step2_title: "2. Mahsulot kiriting",
        step2_desc: "Toifa, narx, rasm va qoldiqni boshqaring.",
        step3_title: "3. Savdoni boshlang",
        step3_desc: "Mijoz Telegram ichida buyurtma beradi, siz panelda nazorat qilasiz.",
        f1_title: "Miniapp katalog",
        f1_desc: "Mijozlar uchun qulay mahsulot ko'rinishi va tez savat.",
        f2_title: "Buyurtma oqimi",
        f2_desc: "Yangi, tayyorlanmoqda, yuborildi va yakunlandi statuslari.",
        f3_title: "Loyallik va to'lovlar",
        f3_desc: "Ballar, qo'lda to'lov va egaga mos sozlamalar.",
        footer_right: "UZ va RU tillari to'liq qo'llab-quvvatlanadi",
      },
      ru: {
        hero_title: "Запустите магазин в Telegram за 5 минут",
        hero_desc: "С SellGram вы управляете каталогом, корзиной, заказами и клиентами в одной платформе.",
        cta_primary: "Создать магазин",
        cta_secondary: "Руководство",
        step1_title: "1. Подключите бота",
        step1_desc: "Укажите токен бота и активируйте магазин.",
        step2_title: "2. Добавьте товары",
        step2_desc: "Управляйте категориями, ценами, фото и остатками.",
        step3_title: "3. Начните продажи",
        step3_desc: "Клиент заказывает в Telegram, вы управляете процессом в панели.",
        f1_title: "Каталог miniapp",
        f1_desc: "Удобная витрина для клиента и быстрый заказ.",
        f2_title: "Поток заказов",
        f2_desc: "Статусы: новый, готовится, отправлен и завершен.",
        f3_title: "Лояльность и оплата",
        f3_desc: "Баллы, ручная оплата и настройки под владельца.",
        footer_right: "Полная поддержка языков UZ и RU",
      }
    };

    const qs = (s) => document.querySelector(s);
    const qsa = (s) => document.querySelectorAll(s);

    function setLang(lang) {
      const t = dict[lang] || dict.uz;
      localStorage.setItem('sellgram_landing_lang', lang);
      document.documentElement.lang = lang;
      qsa('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (key && t[key]) el.textContent = t[key];
      });
      qs('#lang-uz').classList.toggle('active', lang === 'uz');
      qs('#lang-ru').classList.toggle('active', lang === 'ru');
    }

    qs('#lang-uz').addEventListener('click', () => setLang('uz'));
    qs('#lang-ru').addEventListener('click', () => setLang('ru'));

    const browserLang = (navigator.language || '').toLowerCase();
    const saved = localStorage.getItem('sellgram_landing_lang');
    const initial = saved || (browserLang.startsWith('ru') ? 'ru' : 'uz');

    setLang(initial);
    qs('#year').textContent = new Date().getFullYear();
  </script>
</body>
</html>
