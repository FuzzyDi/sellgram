<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SellGram - Руководство по подключению бота</title>
  <style>
    :root {
      --bg: #f2f6f3;
      --panel: #fff;
      --text: #15231a;
      --muted: #5f6f64;
      --line: #d9e5de;
      --brand: #00875a;
      --brand-2: #00b376;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Manrope", "IBM Plex Sans", "Segoe UI", sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 320px at 10% -140px, #d8f0e2 0%, transparent 65%),
        var(--bg);
      line-height: 1.6;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 22px; }
    .top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .brand { display: inline-flex; align-items: center; gap: 10px; font-size: 22px; font-weight: 900; }
    .badge { width: 34px; height: 34px; border-radius: 10px; background: linear-gradient(135deg,var(--brand),var(--brand-2)); color:#fff; display:grid; place-items:center; font-weight:900; }
    .lang { display: inline-flex; border-radius: 999px; background: #e8f0eb; padding: 4px; gap: 4px; }
    .lang button { border: none; border-radius: 999px; padding: 8px 14px; font-weight: 800; font-size: 12px; cursor: pointer; background: transparent; color: #425247; }
    .lang button.active { background: #102117; color: #fff; }

    .back { display: inline-block; color: var(--brand); text-decoration: none; font-weight: 700; margin-bottom: 12px; }

    h1 { font-size: 34px; line-height: 1.1; letter-spacing: -0.8px; margin-bottom: 10px; }
    .lead { color: var(--muted); margin-bottom: 20px; }

    .step {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 18px;
      margin-bottom: 12px;
    }

    .step h2 { font-size: 22px; margin-bottom: 10px; letter-spacing: -0.3px; }
    .step p, .step li { color: #2f3e33; font-size: 15px; }
    .step ul, .step ol { padding-left: 20px; margin-top: 8px; }
    .step li { margin-bottom: 6px; }

    .code {
      margin-top: 10px;
      background: #f4f8f5;
      border: 1px solid #dce6e0;
      border-radius: 12px;
      padding: 10px 12px;
      font-family: "Consolas", "Menlo", monospace;
      font-size: 13px;
      word-break: break-all;
    }

    .cta {
      margin-top: 20px;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      color: #fff;
      border-radius: var(--radius);
      padding: 22px;
      text-align: center;
    }

    .cta a {
      margin-top: 10px;
      display: inline-block;
      text-decoration: none;
      background: #fff;
      color: #0e3f2b;
      font-weight: 800;
      border-radius: 10px;
      padding: 10px 16px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand"><span class="badge">S</span>SellGram</div>
      <div class="lang">
        <button id="lang-uz" type="button">UZ</button>
        <button id="lang-ru" class="active" type="button">RU</button>
      </div>
    </header>

    <a class="back" href="/index.html" data-i18n="back"></a>
    <h1 data-i18n="title"></h1>
    <p class="lead" data-i18n="lead"></p>

    <section class="step">
      <h2 data-i18n="s1_title"></h2>
      <ol>
        <li data-i18n="s1_i1"></li>
        <li data-i18n="s1_i2"></li>
        <li data-i18n="s1_i3"></li>
      </ol>
    </section>

    <section class="step">
      <h2 data-i18n="s2_title"></h2>
      <ol>
        <li data-i18n="s2_i1"></li>
        <li data-i18n="s2_i2"></li>
        <li data-i18n="s2_i3"></li>
      </ol>
      <div class="code">https://app.sellgram.uz</div>
    </section>

    <section class="step">
      <h2 data-i18n="s3_title"></h2>
      <ol>
        <li data-i18n="s3_i1"></li>
        <li data-i18n="s3_i2"></li>
        <li data-i18n="s3_i3"></li>
      </ol>
      <p style="margin-top:10px" data-i18n="s3_hint"></p>
    </section>

    <section class="step">
      <h2 data-i18n="s4_title"></h2>
      <ul>
        <li data-i18n="s4_i1"></li>
        <li data-i18n="s4_i2"></li>
        <li data-i18n="s4_i3"></li>
      </ul>
    </section>

    <div class="cta">
      <p data-i18n="cta_text"></p>
      <a href="https://app.sellgram.uz" data-i18n="cta_btn"></a>
    </div>
  </div>

  <script>
    const dict = {
      uz: {
        back: '← Asosiy sahifaga qaytish',
        title: 'Telegram botni SellGram ga qanday ulash kerak',
        lead: 'Qisqa qo\'llanma: bot yaratish, panelga ulash va birinchi buyurtmani olish.',
        s1_title: '1. BotFather da bot yarating',
        s1_i1: '@BotFather ni oching va /newbot yuboring.',
        s1_i2: 'Bot nomi va username kiriting (username oxiri bot bilan tugashi kerak).',
        s1_i3: 'Berilgan bot tokenni nusxalab oling.',
        s2_title: '2. SellGram admin paneliga kiring',
        s2_i1: 'app.sellgram.uz ga o\'ting va ro\'yxatdan o\'ting/yoki tizimga kiring.',
        s2_i2: 'Sozlamalar bo\'limini oching.',
        s2_i3: 'Do\'konni tahrirlab bot tokenni kiriting.',
        s3_title: '3. Botni tekshiring',
        s3_i1: 'Telegram da o\'z botingizga kiring.',
        s3_i2: '/start yuboring.',
        s3_i3: '"Do\'konni ochish" tugmasi chiqishini tekshiring.',
        s3_hint: 'Agar ishlamasa, tokenni qayta tekshiring va do\'kon sozlamasini saqlang.',
        s4_title: '4. Savdoni ishga tushirish',
        s4_i1: 'Toifa va mahsulotlarni qo\'shing.',
        s4_i2: 'Yetkazib berish va to\'lov usullarini sozlang.',
        s4_i3: 'Bot havolasini mijozlarga yuboring.',
        cta_text: 'Do\'kon tayyor bo\'lsa, boshqaruv paneliga o\'ting.',
        cta_btn: 'Admin panelni ochish'
      },
      ru: {
        back: '← Вернуться на главную',
        title: 'Как подключить Telegram-бота к SellGram',
        lead: 'Короткая инструкция: создайте бота, подключите в панели и получите первый заказ.',
        s1_title: '1. Создайте бота в BotFather',
        s1_i1: 'Откройте @BotFather и отправьте /newbot.',
        s1_i2: 'Укажите имя и username бота (username должен заканчиваться на bot).',
        s1_i3: 'Скопируйте выданный bot token.',
        s2_title: '2. Войдите в панель SellGram',
        s2_i1: 'Откройте app.sellgram.uz и зарегистрируйтесь/войдите.',
        s2_i2: 'Перейдите в раздел настроек.',
        s2_i3: 'Откройте магазин на редактирование и вставьте bot token.',
        s3_title: '3. Проверьте бота',
        s3_i1: 'Откройте бота в Telegram.',
        s3_i2: 'Отправьте /start.',
        s3_i3: 'Проверьте, что появилась кнопка "Открыть магазин".',
        s3_hint: 'Если не работает, перепроверьте token и повторно сохраните настройки магазина.',
        s4_title: '4. Запустите продажи',
        s4_i1: 'Добавьте категории и товары.',
        s4_i2: 'Настройте доставку и способы оплаты.',
        s4_i3: 'Отправьте ссылку на бота клиентам.',
        cta_text: 'Если магазин уже готов, переходите в панель управления.',
        cta_btn: 'Открыть админ-панель'
      }
    };

    const qs = (s) => document.querySelector(s);
    const qsa = (s) => document.querySelectorAll(s);

    function setLang(lang) {
      const t = dict[lang] || dict.ru;
      localStorage.setItem('sellgram_landing_lang', lang);
      document.documentElement.lang = lang;
      qsa('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (key && t[key]) el.textContent = t[key];
      });
      qs('#lang-uz').classList.toggle('active', lang === 'uz');
      qs('#lang-ru').classList.toggle('active', lang === 'ru');
    }

    qs('#lang-uz').addEventListener('click', () => setLang('uz'));
    qs('#lang-ru').addEventListener('click', () => setLang('ru'));

    const saved = localStorage.getItem('sellgram_landing_lang');
    const browserLang = (navigator.language || '').toLowerCase();
    setLang(saved || (browserLang.startsWith('uz') ? 'uz' : 'ru'));
  </script>
</body>
</html>
