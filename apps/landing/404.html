<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Страница не найдена | SellGram</title>
  <meta name="robots" content="noindex" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f2f6f3;
      --panel: #ffffff;
      --panel-soft: #f7fbf8;
      --text: #15231a;
      --muted: #5d6d63;
      --line: #dbe6df;
      --brand: #00875a;
      --brand-2: #00b376;
      --radius: 18px;
      --shadow: 0 20px 50px rgba(14,42,24,0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Manrope","IBM Plex Sans","Segoe UI",sans-serif;
      color: var(--text);
      background:
        radial-gradient(900px 320px at 0% -120px, #d6f0e2 0%, transparent 65%),
        radial-gradient(900px 340px at 100% -140px, #e4f7ee 0%, transparent 66%),
        var(--bg);
      line-height: 1.5;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .wrap { max-width: 1160px; margin: 0 auto; padding: 22px; width: 100%; }

    /* ── Header ── */
    .top { display:flex; justify-content:space-between; align-items:center; gap:14px; margin-bottom:24px; }
    .brand { display:inline-flex; align-items:center; gap:10px; font-weight:900; font-size:24px; letter-spacing:-0.5px; text-decoration:none; color:var(--text); }
    .brand-badge { width:36px; height:36px; border-radius:11px; display:grid; place-items:center; color:#fff; font-weight:900; background:linear-gradient(135deg,var(--brand),var(--brand-2)); }
    .lang { display:inline-flex; border-radius:999px; background:#e8f0eb; padding:4px; gap:4px; }
    .lang button { border:none; border-radius:999px; padding:8px 14px; cursor:pointer; font-size:12px; font-weight:800; color:#415045; background:transparent; transition:background 0.14s,color 0.14s; }
    .lang button.active { background:#0f1f16; color:#fff; }
    .lang button:hover:not(.active) { background:#d4e8da; }

    /* ── Buttons ── */
    .btn { text-decoration:none; border-radius:12px; padding:13px 22px; font-size:14px; font-weight:800; border:1px solid transparent; display:inline-flex; align-items:center; gap:7px; cursor:pointer; transition:background 0.14s,box-shadow 0.14s,transform 0.08s,border-color 0.14s; }
    .btn:active { transform:scale(0.97); }
    .btn.primary { color:#fff; background:linear-gradient(135deg,var(--brand),var(--brand-2)); }
    .btn.primary:hover { background:linear-gradient(135deg,#007a51,#009e66); box-shadow:0 6px 18px rgba(0,135,90,0.30); }
    .btn.ghost { color:#26362b; background:#fff; border-color:var(--line); }
    .btn.ghost:hover { background:var(--panel-soft); border-color:#bfd4c8; }

    /* ── 404 block ── */
    .not-found {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 22px;
    }
    .not-found-inner {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: calc(var(--radius) + 4px);
      box-shadow: var(--shadow);
      padding: 64px 48px;
      text-align: center;
      max-width: 520px;
      width: 100%;
    }
    .code {
      font-size: clamp(80px, 16vw, 140px);
      font-weight: 900;
      letter-spacing: -4px;
      line-height: 1;
      background: linear-gradient(135deg, var(--brand), var(--brand-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 16px;
    }
    .not-found-inner h1 {
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 10px;
      letter-spacing: -0.3px;
    }
    .not-found-inner p {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 32px;
      line-height: 1.6;
    }
    .not-found-actions {
      display: flex;
      gap: 10px;
      justify-content: center;
      flex-wrap: wrap;
    }

    @media (max-width: 600px) {
      .not-found-inner { padding: 40px 24px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <a href="/" class="brand">
        <div class="brand-badge">S</div>
        SellGram
      </a>
      <div class="lang">
        <button onclick="setLang('ru')" id="btn-ru" class="active">RU</button>
        <button onclick="setLang('uz')" id="btn-uz">UZ</button>
      </div>
    </header>
  </div>

  <div class="not-found">
    <div class="not-found-inner">
      <div class="code">404</div>
      <h1 data-i18n="title"></h1>
      <p data-i18n="desc"></p>
      <div class="not-found-actions">
        <a href="/" class="btn primary" data-i18n="home"></a>
        <a href="/guide" class="btn ghost" data-i18n="guide"></a>
      </div>
    </div>
  </div>

  <script>
    const dict = {
      ru: {
        title: 'Страница не найдена',
        desc:  'Такой страницы не существует. Возможно, ссылка устарела или была введена с ошибкой.',
        home:  '← На главную',
        guide: 'Руководство',
      },
      uz: {
        title: 'Sahifa topilmadi',
        desc:  'Bunday sahifa mavjud emas. Ehtimol, havola eskirgan yoki noto\'g\'ri kiritilgan.',
        home:  '← Bosh sahifa',
        guide: 'Qo\'llanma',
      },
    };

    function setLang(lang) {
      const t = dict[lang];
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.getAttribute('data-i18n');
        if (t[key] !== undefined) el.textContent = t[key];
      });
      document.getElementById('btn-ru').classList.toggle('active', lang === 'ru');
      document.getElementById('btn-uz').classList.toggle('active', lang === 'uz');
      document.documentElement.lang = lang;
      if (lang === 'uz') {
        document.title = "404 — Sahifa topilmadi | SellGram";
      } else {
        document.title = "404 — Страница не найдена | SellGram";
      }
    }

    // Auto-detect language from browser or previous choice
    const saved = localStorage.getItem('sg_lang');
    const browser = navigator.language?.startsWith('uz') ? 'uz' : 'ru';
    setLang(saved || browser);
  </script>
</body>
</html>
