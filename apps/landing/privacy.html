<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SellGram - Политика конфиденциальности</title>
  <style>
    :root {
      --bg: #f2f6f3;
      --panel: #fff;
      --text: #17241b;
      --muted: #5d6c62;
      --line: #d9e5de;
      --brand: #00875a;
      --brand-2: #00b376;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Manrope", "IBM Plex Sans", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 22px; }
    .top { display:flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .brand { display: inline-flex; align-items:center; gap:10px; font-weight:900; font-size:22px; }
    .badge { width:34px; height:34px; border-radius:10px; background: linear-gradient(135deg,var(--brand),var(--brand-2)); color:#fff; display:grid; place-items:center; font-weight:900; }
    .lang { display:inline-flex; border-radius:999px; background:#e8f0eb; padding:4px; gap:4px; }
    .lang button { border:none; border-radius:999px; padding:8px 14px; font-size:12px; font-weight:800; cursor:pointer; background:transparent; color:#425247; }
    .lang button.active { background:#102117; color:#fff; }

    .card { background: var(--panel); border:1px solid var(--line); border-radius: var(--radius); padding: 24px; }
    .back { display:inline-block; color:var(--brand); text-decoration:none; font-weight:700; margin-bottom:12px; }
    h1 { font-size: 32px; line-height:1.1; margin-bottom: 6px; letter-spacing:-0.7px; }
    .date { color: var(--muted); font-size: 14px; margin-bottom: 18px; }
    h2 { font-size: 20px; margin: 18px 0 8px; }
    p, li { font-size: 15px; color: #2f3e33; }
    ul { padding-left: 20px; }
    li { margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand"><span class="badge">S</span>SellGram</div>
      <div class="lang">
        <button id="lang-uz" type="button">UZ</button>
        <button id="lang-ru" class="active" type="button">RU</button>
      </div>
    </header>

    <article class="card">
      <a class="back" href="/index.html" data-i18n="back"></a>
      <h1 data-i18n="title"></h1>
      <p class="date" data-i18n="date"></p>

      <p data-i18n="intro"></p>

      <h2 data-i18n="s1"></h2>
      <ul>
        <li data-i18n="s1_i1"></li>
        <li data-i18n="s1_i2"></li>
        <li data-i18n="s1_i3"></li>
      </ul>

      <h2 data-i18n="s2"></h2>
      <ul>
        <li data-i18n="s2_i1"></li>
        <li data-i18n="s2_i2"></li>
        <li data-i18n="s2_i3"></li>
      </ul>

      <h2 data-i18n="s3"></h2>
      <p data-i18n="s3_p"></p>

      <h2 data-i18n="s4"></h2>
      <p data-i18n="s4_p"></p>

      <h2 data-i18n="s5"></h2>
      <ul>
        <li data-i18n="s5_i1"></li>
        <li data-i18n="s5_i2"></li>
      </ul>

      <h2 data-i18n="s6"></h2>
      <p data-i18n="s6_p"></p>
    </article>
  </div>

  <script>
    const dict = {
      uz: {
        back: '← Asosiy sahifaga qaytish',
        title: 'Maxfiylik siyosati',
        date: 'Kuchga kirish sanasi: 14 mart 2026 yil',
        intro: 'Ushbu siyosat SellGram xizmatidan foydalanishda shaxsiy ma\'lumotlar qanday yig\'ilishi, ishlatilishi va himoyalanishini tushuntiradi.',
        s1: '1. Qanday ma\'lumotlarni yig\'amiz',
        s1_i1: 'Hisob ma\'lumotlari: email, ism, do\'kon nomi.',
        s1_i2: 'Telegram ma\'lumotlari: Telegram ID, username va WebApp init ma\'lumotlari.',
        s1_i3: 'Buyurtma ma\'lumotlari: manzil, aloqa raqami, xarid tarixi.',
        s2: '2. Ma\'lumotlardan foydalanish maqsadi',
        s2_i1: 'Xizmatni taqdim etish va yaxshilash.',
        s2_i2: 'Buyurtmalarni qayta ishlash va xizmat xabarnomalari yuborish.',
        s2_i3: 'Texnik xavfsizlik va audit jurnalini yuritish.',
        s3: '3. Himoya va saqlash',
        s3_p: 'Ma\'lumotlar himoyalangan infratuzilmada saqlanadi. Parollar xesh ko\'rinishida saqlanadi. Xizmatga kirishlar va muhim amallar loglanadi.',
        s4: '4. Uchinchi tomonlarga uzatish',
        s4_p: 'Ma\'lumotlar faqat xizmatni taqdim etish uchun zarur integratsiyalarga uzatilishi mumkin. SellGram do\'kon to\'lov mablag\'larini o\'zi qabul qilmaydi.',
        s5: '5. Foydalanuvchi huquqlari',
        s5_i1: 'O\'z ma\'lumotlariga kirish yoki yangilashni so\'rash.',
        s5_i2: 'Qonunchilik ruxsat bergan holatlarda ma\'lumotni o\'chirishni so\'rash.',
        s6: '6. Aloqa',
        s6_p: 'Maxfiylik bo\'yicha savollar uchun: privacy@sellgram.uz'
      },
      ru: {
        back: '← Вернуться на главную',
        title: 'Политика конфиденциальности',
        date: 'Дата вступления в силу: 14 марта 2026 года',
        intro: 'Настоящая политика объясняет, как обрабатываются персональные данные при использовании сервиса SellGram.',
        s1: '1. Какие данные мы собираем',
        s1_i1: 'Данные аккаунта: email, имя, название магазина.',
        s1_i2: 'Данные Telegram: Telegram ID, username, init-данные WebApp.',
        s1_i3: 'Данные заказов: адрес, контактный номер, история покупок.',
        s2: '2. Зачем мы используем данные',
        s2_i1: 'Для предоставления и улучшения сервиса.',
        s2_i2: 'Для обработки заказов и сервисных уведомлений.',
        s2_i3: 'Для технической безопасности и аудита.',
        s3: '3. Защита и хранение',
        s3_p: 'Данные хранятся в защищенной инфраструктуре. Пароли сохраняются в виде хешей. Критичные действия журналируются.',
        s4: '4. Передача третьим лицам',
        s4_p: 'Передача данных возможна только в рамках необходимых интеграций. SellGram не принимает деньги магазина на себя.',
        s5: '5. Права пользователя',
        s5_i1: 'Запросить доступ к своим данным или их исправление.',
        s5_i2: 'Запросить удаление данных в случаях, предусмотренных законом.',
        s6: '6. Контакты',
        s6_p: 'По вопросам конфиденциальности: privacy@sellgram.uz'
      }
    };

    const qs = (s) => document.querySelector(s);
    const qsa = (s) => document.querySelectorAll(s);

    function setLang(lang) {
      const t = dict[lang] || dict.ru;
      localStorage.setItem('sellgram_landing_lang', lang);
      document.documentElement.lang = lang;
      qsa('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (key && t[key]) el.textContent = t[key];
      });
      qs('#lang-uz').classList.toggle('active', lang === 'uz');
      qs('#lang-ru').classList.toggle('active', lang === 'ru');
    }

    qs('#lang-uz').addEventListener('click', () => setLang('uz'));
    qs('#lang-ru').addEventListener('click', () => setLang('ru'));

    const saved = localStorage.getItem('sellgram_landing_lang');
    const browserLang = (navigator.language || '').toLowerCase();
    setLang(saved || (browserLang.startsWith('uz') ? 'uz' : 'ru'));
  </script>
</body>
</html>
