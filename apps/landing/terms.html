<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SellGram — Пользовательское соглашение</title>
  <meta name="description" content="Пользовательское соглашение SellGram — условия использования платформы для управления Telegram-магазином." />
  <link rel="canonical" href="https://sellgram.uz/terms" />
  <meta property="og:type"  content="website" />
  <meta property="og:url"   content="https://sellgram.uz/terms" />
  <meta property="og:title" content="Пользовательское соглашение — SellGram" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f2f6f3;
      --panel: #fff;
      --text: #17241b;
      --muted: #5d6c62;
      --line: #d9e5de;
      --brand: #00875a;
      --brand-2: #00b376;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Manrope", "IBM Plex Sans", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.65;
    }
    .wrap { max-width: 860px; margin: 0 auto; padding: 22px; }
    .top { display:flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
    .brand { display:inline-flex; align-items:center; gap:10px; font-weight:900; font-size:22px; }
    .badge { width:34px; height:34px; border-radius:10px; background: linear-gradient(135deg,var(--brand),var(--brand-2)); color:#fff; display:grid; place-items:center; font-weight:900; }
    .lang { display:inline-flex; border-radius:999px; background:#e8f0eb; padding:4px; gap:4px; }
    .lang button { border:none; border-radius:999px; padding:8px 14px; font-size:12px; font-weight:800; cursor:pointer; background:transparent; color:#425247; }
    .lang button.active { background:#102117; color:#fff; }

    .card { background: var(--panel); border:1px solid var(--line); border-radius: var(--radius); padding: 24px; }
    .back { display:inline-block; color:var(--brand); text-decoration:none; font-weight:700; margin-bottom:12px; }
    h1 { font-size: 32px; line-height:1.1; margin-bottom: 6px; letter-spacing:-0.7px; }
    .date { color: var(--muted); font-size: 14px; margin-bottom: 18px; }
    h2 { font-size: 20px; margin: 18px 0 8px; }
    p, li { font-size: 15px; color: #2f3e33; }
    ul { padding-left: 20px; }
    li { margin-bottom: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="top">
      <div class="brand"><span class="badge">S</span>SellGram</div>
      <div class="lang">
        <button id="lang-uz" type="button">UZ</button>
        <button id="lang-ru" class="active" type="button">RU</button>
      </div>
    </header>

    <article class="card">
      <a class="back" href="/" data-i18n="back"></a>
      <h1 data-i18n="title"></h1>
      <p class="date" data-i18n="date"></p>

      <p data-i18n="intro"></p>

      <h2 data-i18n="s1"></h2>
      <p data-i18n="s1_p"></p>

      <h2 data-i18n="s2"></h2>
      <ul>
        <li data-i18n="s2_i1"></li>
        <li data-i18n="s2_i2"></li>
        <li data-i18n="s2_i3"></li>
      </ul>

      <h2 data-i18n="s3"></h2>
      <ul>
        <li data-i18n="s3_i1"></li>
        <li data-i18n="s3_i2"></li>
        <li data-i18n="s3_i3"></li>
      </ul>

      <h2 data-i18n="s4"></h2>
      <p data-i18n="s4_p"></p>

      <h2 data-i18n="s5"></h2>
      <p data-i18n="s5_p"></p>

      <h2 data-i18n="s6"></h2>
      <p data-i18n="s6_p"></p>
    </article>
  </div>

  <script>
    const dict = {
      uz: {
        back: '← Asosiy sahifaga qaytish',
        title: 'Foydalanuvchi kelishuvi',
        date: 'Kuchga kirish sanasi: 14 mart 2026 yil',
        intro: 'Ushbu kelishuv SellGram platformasidan foydalanish shartlarini belgilaydi.',
        s1: '1. Xizmat mohiyati',
        s1_p: 'SellGram Telegram ichida do\'kon yuritish uchun texnik platforma hisoblanadi.',
        s2: '2. Platforma nimani taqdim etadi',
        s2_i1: 'Do\'kon admin paneli: mahsulot, buyurtma, mijoz, sozlamalar.',
        s2_i2: 'Miniapp va Telegram bot bilan ishlash uchun infratuzilma.',
        s2_i3: 'Tarif va obuna boshqaruvi.',
        s3: '3. Foydalanuvchi majburiyatlari',
        s3_i1: 'Qonun va platforma qoidalariga rioya qilish.',
        s3_i2: 'Tovar va xizmatlar bo\'yicha to\'g\'ri ma\'lumot berish.',
        s3_i3: 'Mijozlar oldidagi savdo majburiyatlarini mustaqil bajarish.',
        s4: '4. To\'lovlar va javobgarlik',
        s4_p: 'SellGram do\'konning savdo mablag\'larini o\'zi qabul qilmaydi. To\'lov usullarini do\'kon egasi mustaqil sozlaydi.',
        s5: '5. Cheklov va to\'xtatish',
        s5_p: 'Qoidabuzarlik holatida hisobga kirish vaqtincha cheklanishi yoki to\'xtatilishi mumkin.',
        s6: '6. Aloqa',
        s6_p: 'Yordam: support@sellgram.uz | Billing: billing@sellgram.uz'
      },
      ru: {
        back: '← Вернуться на главную',
        title: 'Пользовательское соглашение',
        date: 'Дата вступления в силу: 14 марта 2026 года',
        intro: 'Настоящее соглашение регулирует условия использования платформы SellGram.',
        s1: '1. Суть сервиса',
        s1_p: 'SellGram является технической платформой для управления магазином в Telegram.',
        s2: '2. Что предоставляет платформа',
        s2_i1: 'Панель управления магазином: товары, заказы, клиенты, настройки.',
        s2_i2: 'Инфраструктуру для miniapp и Telegram-бота.',
        s2_i3: 'Управление тарифом и подпиской.',
        s3: '3. Обязанности пользователя',
        s3_i1: 'Соблюдать применимое законодательство и правила платформ.',
        s3_i2: 'Публиковать достоверную информацию о товарах и услугах.',
        s3_i3: 'Самостоятельно исполнять обязательства перед покупателями.',
        s4: '4. Оплата и ответственность',
        s4_p: 'SellGram не принимает торговые средства магазина на себя. Способы оплаты настраиваются владельцем магазина.',
        s5: '5. Ограничение и прекращение доступа',
        s5_p: 'При нарушении правил доступ к аккаунту может быть ограничен или приостановлен.',
        s6: '6. Контакты',
        s6_p: 'Поддержка: support@sellgram.uz | Billing: billing@sellgram.uz'
      }
    };

    const qs = (s) => document.querySelector(s);
    const qsa = (s) => document.querySelectorAll(s);

    function setLang(lang) {
      const t = dict[lang] || dict.ru;
      localStorage.setItem('sellgram_landing_lang', lang);
      document.documentElement.lang = lang;
      qsa('[data-i18n]').forEach((el) => {
        const key = el.getAttribute('data-i18n');
        if (key && t[key]) el.textContent = t[key];
      });
      qs('#lang-uz').classList.toggle('active', lang === 'uz');
      qs('#lang-ru').classList.toggle('active', lang === 'ru');
    }

    qs('#lang-uz').addEventListener('click', () => setLang('uz'));
    qs('#lang-ru').addEventListener('click', () => setLang('ru'));

    const saved = localStorage.getItem('sellgram_landing_lang');
    const browserLang = (navigator.language || '').toLowerCase();
    setLang(saved || (browserLang.startsWith('uz') ? 'uz' : 'ru'));
  </script>
</body>
</html>
