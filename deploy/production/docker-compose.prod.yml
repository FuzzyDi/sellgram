services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-sellgram}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-sellgram}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-sellgram}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"
    networks:
      - internal

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: always
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --save 60 1
      --appendonly yes
      --appendfsync everysec
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - internal

  # ── MinIO (file storage) ───────────────────────────────────
  minio:
    image: minio/minio:latest
    restart: always
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY}
    volumes:
      - miniodata:/data
    command: server /data --console-address ":9001"
    networks:
      - internal

  minio-init:
    image: minio/mc:latest
    restart: "no"
    depends_on:
      - minio
    entrypoint:
      - /bin/sh
      - -c
      - |
        until mc alias set local http://minio:9000 "${S3_ACCESS_KEY}" "${S3_SECRET_KEY}"; do
          sleep 2
        done
        mc mb --ignore-existing "local/${S3_BUCKET:-sellgram}"
    networks:
      - internal

  # ── API (Fastify backend) ──────────────────────────────────
  api:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile.api
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
      prisma-init:
        condition: service_completed_successfully
    environment:
      DATABASE_URL: postgresql://${DB_USER:-sellgram}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-sellgram}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      SYSTEM_JWT_SECRET: ${SYSTEM_JWT_SECRET}
      SYSTEM_ADMIN_EMAIL: ${SYSTEM_ADMIN_EMAIL}
      SYSTEM_ADMIN_PASSWORD: ${SYSTEM_ADMIN_PASSWORD}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_BUCKET: ${S3_BUCKET:-sellgram}
      S3_REGION: us-east-1
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      APP_URL: ${APP_URL:-https://api.sellgram.uz}
      ADMIN_URL: ${ADMIN_URL:-https://app.sellgram.uz}
      MINIAPP_URL: ${MINIAPP_URL:-https://miniapp.sellgram.uz}
      LANDING_URL: ${LANDING_URL:-https://sellgram.uz}
      ALLOW_DEV_AUTH_BYPASS: ${ALLOW_DEV_AUTH_BYPASS:-false}
      MINIAPP_INITDATA_MAX_AGE_SEC: ${MINIAPP_INITDATA_MAX_AGE_SEC:-600}
      API_PORT: 4000
      NODE_ENV: production
    healthcheck:
      test:
        - CMD-SHELL
        - >
          node -e "require('http').get('http://127.0.0.1:4000/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "5"
    networks:
      - internal

  prisma-init:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile.api
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${DB_USER:-sellgram}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-sellgram}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      SYSTEM_ADMIN_EMAIL: ${SYSTEM_ADMIN_EMAIL}
      SYSTEM_ADMIN_PASSWORD: ${SYSTEM_ADMIN_PASSWORD}
      DEMO_BOT_TOKEN: ${DEMO_BOT_TOKEN:-}
      MINIAPP_URL: ${MINIAPP_URL:-https://miniapp.sellgram.uz}
      PRISMA_SEED: ${PRISMA_SEED:-false}
    command:
      - sh
      - -c
      - |
        pnpm -w exec prisma migrate deploy --schema packages/prisma/schema.prisma
        if [ "${PRISMA_SEED}" = "true" ]; then
          cd /app/packages/prisma && pnpm exec tsx seed.ts
        fi
    networks:
      - internal

  # ── Admin Panel (static) ───────────────────────────────────
  admin:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile.admin
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

  # ── Mini App (static) ──────────────────────────────────────
  miniapp:
    build:
      context: ../..
      dockerfile: deploy/Dockerfile.miniapp
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks:
      - internal

  # ── Nginx (reverse proxy) ──────────────────────────────────
  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "${NGINX_HTTP_PORT:-8080}:80"
      - "${NGINX_HTTPS_PORT:-8443}:443"
    volumes:
      - ./nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ../../apps/landing:/usr/share/nginx/html/landing:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      api:
        condition: service_healthy
      admin:
        condition: service_healthy
      miniapp:
        condition: service_healthy
    networks:
      - internal

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  internal:
    driver: bridge

