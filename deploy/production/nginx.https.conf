# SellGram Nginx - HTTPS production routing
# Docker DNS resolver — re-resolves container IPs every 30s so restarts don't cause 502
resolver 127.0.0.11 valid=30s ipv6=off;

limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=webhook:10m rate=50r/s;

server {
    listen 80;
    server_name sellgram.uz www.sellgram.uz app.sellgram.uz admin.sellgram.uz miniapp.sellgram.uz api.sellgram.uz;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sellgram.uz www.sellgram.uz;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    client_max_body_size 10M;

    location / {
        root /usr/share/nginx/html/landing;
        try_files $uri $uri.html /index.html =404;
    }
}

server {
    listen 443 ssl http2;
    server_name app.sellgram.uz;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    client_max_body_size 10M;

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        set $upstream_api api;
        proxy_pass http://$upstream_api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        set $upstream_api api;
        proxy_pass http://$upstream_api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        set $upstream_admin admin;
        proxy_pass http://$upstream_admin:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl http2;
    server_name admin.sellgram.uz;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    return 301 https://app.sellgram.uz$request_uri;
}

server {
    listen 443 ssl http2;
    server_name miniapp.sellgram.uz;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;

    location /api/ {
        set $upstream_api api;
        proxy_pass http://$upstream_api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location /uploads/ {
        set $upstream_api api;
        proxy_pass http://$upstream_api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location / {
        set $upstream_miniapp miniapp;
        proxy_pass http://$upstream_miniapp:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}

server {
    listen 443 ssl http2;
    server_name api.sellgram.uz;

    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    client_max_body_size 10M;

    location /api/ {
        limit_req zone=api burst=20 nodelay;
        set $upstream_api api;
        proxy_pass http://$upstream_api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 60s;
    }

    location /webhook/ {
        limit_req zone=webhook burst=30 nodelay;
        set $upstream_api api;
        proxy_pass http://$upstream_api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /uploads/ {
        set $upstream_api api;
        proxy_pass http://$upstream_api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /health {
        set $upstream_api api;
        proxy_pass http://$upstream_api:4000;
        proxy_set_header Host $host;
    }

    location / {
        set $upstream_api api;
        proxy_pass http://$upstream_api:4000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
}
