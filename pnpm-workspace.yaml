packages:
  - "packages/*"
  - "apps/*"

overrides:
  react: "^18.3.0"
  react-dom: "^18.3.0"

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - "bcrypt"
  - "esbuild"
  - "msgpackr-extract"
  - "prisma"
  - "sharp"

allowBuilds:
  "@prisma/client": true
  "@prisma/engines": true
  bcrypt: true
  esbuild: true
  "msgpackr-extract": true
  prisma: true
  sharp: true
