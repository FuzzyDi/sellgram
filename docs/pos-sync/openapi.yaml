openapi: 3.0.3
info:
  title: POS Sync API
  version: "1.0.0"
  description: >
    Contract between SBGCloud (this repository) and SBG Lite POS (a separate
    repository, local offline-first till software). See
    ../POS_SYNC_API.md for the full narrative contract this file mirrors —
    that document is the source of truth; this file is a machine-readable
    restatement of the same endpoints for client/server code generation.
    Nothing in this file has been used to change the current server
    implementation (apps/api/src/modules/pos-sync/routes.ts) — see
    POS_SYNC_API.md §21 for the gap between this contract and that code.
servers:
  - url: /api/pos/v1

tags:
  - name: activation
  - name: sync
  - name: events
  - name: commands

paths:
  /activate:
    post:
      tags: [activation]
      summary: Exchange a one-time activation code for a device credential
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/activate.schema.json#/definitions/ActivateRequest'
      responses:
        '201':
          description: Device activated
          content:
            application/json:
              schema:
                $ref: './schemas/activate.schema.json#/definitions/ActivateResponse'
        '400':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'
        '409':
          description: deviceCode already assigned to another active device in this tenant (DEVICE_CODE_ALREADY_IN_USE)
          content:
            application/json:
              schema:
                $ref: './schemas/envelope.schema.json#/definitions/ErrorEnvelope'
        '429':
          $ref: '#/components/responses/Error'

  /heartbeat:
    post:
      tags: [sync]
      summary: Liveness/health signal from an active device
      security: [{ deviceBearer: [], deviceCode: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/heartbeat.schema.json#/definitions/HeartbeatRequest'
      responses:
        '200':
          description: Heartbeat acknowledged
          content:
            application/json:
              schema:
                $ref: './schemas/heartbeat.schema.json#/definitions/HeartbeatResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'

  /catalog/snapshot:
    get:
      tags: [sync]
      summary: Latest (or delta, future) catalog snapshot for the device's store
      security: [{ deviceBearer: [], deviceCode: [] }]
      parameters:
        - name: storeId
          in: query
          required: true
          schema: { type: string }
        - name: sinceVersion
          in: query
          required: false
          schema: { type: integer }
      responses:
        '200':
          description: Snapshot
          content:
            application/json:
              schema:
                $ref: './schemas/catalog-snapshot.schema.json#/definitions/CatalogSnapshotEnvelope'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'

  /settings:
    get:
      tags: [sync]
      summary: Store/device settings snapshot
      security: [{ deviceBearer: [], deviceCode: [] }]
      responses:
        '200':
          description: Settings
          content:
            application/json:
              schema:
                $ref: './schemas/settings.schema.json#/definitions/SettingsEnvelope'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'

  /sale-events:
    post:
      tags: [events]
      summary: Ingest a sale lifecycle event (idempotent)
      security: [{ deviceBearer: [], deviceCode: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/sale-event.schema.json#/definitions/SaleEvent'
      responses:
        '201':
          description: Event ingested (or identical replay of an already-ingested event)
          content:
            application/json:
              schema:
                $ref: './schemas/sale-event.schema.json#/definitions/SaleEventResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /fiscal-events:
    post:
      tags: [events]
      summary: >
        Ingest a fiscal-module receipt lifecycle event, per the real SBG
        Lite POS Android contract (idempotent by eventId). Response is
        deliberately flat, not the general envelope — see
        POS_SYNC_API.md §12.
      security: [{ deviceBearer: [], deviceCode: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/fiscal-event.schema.json#/definitions/FiscalEvent'
      responses:
        '201':
          description: Event ingested
          content:
            application/json:
              schema:
                $ref: './schemas/fiscal-event.schema.json#/definitions/FiscalEventAckResponse'
        '200':
          description: Identical eventId replay — idempotent no-op
          content:
            application/json:
              schema:
                $ref: './schemas/fiscal-event.schema.json#/definitions/FiscalEventAckResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'

  /shift-events:
    post:
      tags: [events]
      summary: >
        Ingest a cashier shift lifecycle event, per the real SBG Lite POS
        Android contract (idempotent by eventId). Same flat response as
        /fiscal-events — see POS_SYNC_API.md §13.
      security: [{ deviceBearer: [], deviceCode: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/shift-event.schema.json#/definitions/ShiftEvent'
      responses:
        '201':
          description: Event ingested
          content:
            application/json:
              schema:
                $ref: './schemas/shift-event.schema.json#/definitions/ShiftEventAckResponse'
        '200':
          description: Identical eventId replay — idempotent no-op
          content:
            application/json:
              schema:
                $ref: './schemas/shift-event.schema.json#/definitions/ShiftEventAckResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'

  /stock-events:
    post:
      tags: [events]
      summary: Ingest a non-sale stock movement (adjustment/restock, idempotent)
      security: [{ deviceBearer: [], deviceCode: [] }]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/stock-event.schema.json#/definitions/StockEvent'
      responses:
        '201':
          description: Event ingested (or identical replay of an already-ingested event)
          content:
            application/json:
              schema:
                $ref: './schemas/stock-event.schema.json#/definitions/StockEventResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '409':
          $ref: '#/components/responses/Error'

  /commands:
    get:
      tags: [commands]
      summary: >
        Poll for pending cloud commands targeting this device. Response is
        the real contract's literal flat shape — no `data`, no
        `requestId` — see POS_SYNC_API.md §15.
      security: [{ deviceBearer: [], deviceCode: [] }]
      responses:
        '200':
          description: Pending commands (possibly empty)
          content:
            application/json:
              schema:
                $ref: './schemas/cloud-command.schema.json#/definitions/CommandListResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'

  /commands/{id}/ack:
    post:
      tags: [commands]
      summary: >
        Acknowledge a delivered command. Tenant/device isolation enforced
        — acking a command belonging to a different device is 404.
      security: [{ deviceBearer: [], deviceCode: [] }]
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: './schemas/cloud-command.schema.json#/definitions/CommandAckRequest'
      responses:
        '200':
          description: Command acknowledged
          content:
            application/json:
              schema:
                $ref: './schemas/cloud-command.schema.json#/definitions/CommandAckResponse'
        '400':
          $ref: '#/components/responses/Error'
        '401':
          $ref: '#/components/responses/Error'
        '404':
          $ref: '#/components/responses/Error'

components:
  securitySchemes:
    deviceBearer:
      type: http
      scheme: bearer
      description: >
        Device access token issued by POST /activate — the sole real
        authentication factor (POS_SYNC_API.md §4).
    deviceCode:
      type: apiKey
      in: header
      name: X-Device-Code
      description: >
        Public, non-secret device identifier — required alongside
        deviceBearer (never in place of it) on every authenticated
        endpoint except /activate. Checked for a match against the device
        resolved via deviceBearer; a mismatch is 401, a missing header is
        400. See POS_SYNC_API.md §4/§22.
  responses:
    Success:
      description: Generic success envelope
      content:
        application/json:
          schema:
            $ref: './schemas/envelope.schema.json#/definitions/SuccessEnvelope'
    Error:
      description: Generic error envelope
      content:
        application/json:
          schema:
            $ref: './schemas/envelope.schema.json#/definitions/ErrorEnvelope'
